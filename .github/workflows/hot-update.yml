name: Publish Hot Update Bundle

on:
  push:
    branches: [main]
    paths:
      - 'frontend-vite/src/**'
      - 'backend/**/*.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-vite/package-lock.json

      - name: Install & Build frontend
        working-directory: frontend-vite
        run: |
          npm ci
          npm run build

      - name: Determine version (YYYYMMDD.N)
        id: ver
        run: |
          TODAY=$(date -u +%Y%m%d)
          # Fetch existing manifest to find last sequence
          LAST_SEQ=0
          MANIFEST_URL="https://laurenszero.github.io/paper_labeler/manifest.json"
          EXISTING=$(curl -sf "$MANIFEST_URL" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            LAST_VER=$(echo "$EXISTING" | jq -r '.version // ""')
            if [[ "$LAST_VER" == "$TODAY."* ]]; then
              LAST_SEQ=${LAST_VER##*.}
            fi
          fi
          SEQ=$((LAST_SEQ + 1))
          VERSION="${TODAY}.${SEQ}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create bundle ZIP
        run: |
          mkdir -p _bundle/ui _bundle/backend
          cp -r frontend-vite/dist/* _bundle/ui/
          # Copy all Python files preserving directory structure
          cd backend
          find . -name "*.py" -exec sh -c 'mkdir -p ../_bundle/backend/$(dirname "{}") && cp "{}" ../_bundle/backend/$(dirname "{}")/' \;
          cd ..
          cd _bundle
          zip -r ../bundle-${{ steps.ver.outputs.version }}.zip ui/ backend/

      - name: Compute SHA-256
        id: hash
        run: echo "sha256=$(sha256sum bundle-${{ steps.ver.outputs.version }}.zip | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Generate manifest & deploy
        run: |
          mkdir _deploy
          cat > _deploy/manifest.json <<EOF
          {
            "version": "${{ steps.ver.outputs.version }}",
            "url": "bundle-${{ steps.ver.outputs.version }}.zip",
            "hash": "sha256:${{ steps.hash.outputs.sha256 }}",
            "notes": "$(git log --oneline -5 | tr '\n' ' ')",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cp bundle-${{ steps.ver.outputs.version }}.zip _deploy/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _deploy
          destination_dir: .
          keep_files: false
